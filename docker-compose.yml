version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT:-8100}:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
    restart: always

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-5180}:5173"
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL}
      - VITE_INVOICE_NINJA_BASE_URL=${VITE_INVOICE_NINJA_BASE_URL}
      - VITE_ALLOWED_HOSTS=${VITE_ALLOWED_HOSTS}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    stdin_open: true
    tty: true
    restart: always
